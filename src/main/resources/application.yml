spring:
  profiles:
    active: dev
  application:
    name: suprsyncr

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:suprsyncr_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 0
      auto-commit: true
      pool-name: Suprsyncr-HikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  security:
    user:
      name: admin
      password: admin

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-environment}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# Application Configuration
app:
  encryption:
    key: ${ENCRYPTION_KEY:12345678901234567890123456789012}

# OpenAI Configuration
suprsyncr:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: ${OPENAI_MODEL:gpt-4o}
    max-output-tokens: 4096
    temperature: 0.7

# AWS S3 Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${S3_BUCKET_NAME:suprsyncr-product-images}
    endpoint: ${S3_ENDPOINT:}
    access-key-id: ${AWS_ACCESS_KEY_ID:test}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:test}

# Shopify OAuth Configuration
shopify:
  client-id: ${SHOPIFY_CLIENT_ID:}
  client-secret: ${SHOPIFY_CLIENT_SECRET:}
  scopes: read_products,write_products,read_orders,write_orders,read_inventory,write_inventory,read_analytics,write_webhooks
  redirect-uri: ${SHOPIFY_REDIRECT_URI:http://localhost:8080/shopify/callback}
  # Public HTTPS base URL Shopify posts to, e.g. https://api.example.com
  webhook-base-url: ${SHOPIFY_WEBHOOK_BASE_URL:}

# HTTP Client Configuration
http:
  client:
    connect-timeout: 30000
    read-timeout: 60000
    write-timeout: 30000

# Logging Configuration
logging:
  level:
    root: INFO
    com.suprsyncr: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# Autopilot Agent Service Configuration
# NOTE: use 127.0.0.1 (not "localhost") for the engine URL. On Windows
# "localhost" can resolve to IPv6 [::1] first; if uvicorn binds only to IPv4
# 127.0.0.1 the backend gets "Failed to connect to localhost/[::1]:8081".
# Pinning IPv4 avoids that entirely.
autopilot:
  agent-service-url: ${AGENT_SERVICE_URL:http://127.0.0.1:8081}
  enabled: true
  daily-run-enabled: false
  # Inference Engine (Python :8081) — primary cognition path; stub is fallback only.
  engine:
    enabled: ${AUTOPILOT_ENGINE_ENABLED:true}
    budget-inr: ${AUTOPILOT_ENGINE_BUDGET_INR:5.0}

# Product Studio (Scenario 2 — manual AI listing authoring)
studio:
  engine-url: ${STUDIO_ENGINE_URL:http://127.0.0.1:8081}
  publish-to-shopify: ${STUDIO_PUBLISH_TO_SHOPIFY:false}
  budget-inr: ${STUDIO_BUDGET_INR:3.0}

# Sale Attribution (Scenario 3 — order-triggered)
# Defaults to the autopilot engine URL when not set explicitly.
attribution:
  engine-url: ${ATTRIBUTION_ENGINE_URL:}
  budget-inr: ${ATTRIBUTION_BUDGET_INR:5.0}
  # Trigger gate: a sale is admitted for analysis when the product had an
  # approved/applied Suprsyncr change within this many days.
  gate-window-days: ${ATTRIBUTION_GATE_WINDOW_DAYS:30}
  # Max similar products the manager can propagate to per run.
  max-similar: ${ATTRIBUTION_MAX_SIMILAR:8}
  # Auto-poller: scan recent orders for new attribution opportunities.
  poll-enabled: ${ATTRIBUTION_POLL_ENABLED:true}
  poll-interval-ms: ${ATTRIBUTION_POLL_INTERVAL_MS:60000}
  poll-lookback-min: ${ATTRIBUTION_POLL_LOOKBACK_MIN:30}
  poll-batch: ${ATTRIBUTION_POLL_BATCH:50}

# Internal service-to-service auth (engine ↔ backend).
# Shared secret used by the /api/internal/** filter chain. Empty disables
# the internal endpoints (filter returns 503) so a missing env var fails
# closed rather than open.
internal:
  service-token: ${INTERNAL_SERVICE_TOKEN:}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
