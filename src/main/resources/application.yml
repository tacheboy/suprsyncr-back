spring:
  profiles:
    active: dev
  application:
    name: suprsyncr

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:suprsyncr_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 0
      auto-commit: true
      pool-name: Suprsyncr-HikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  security:
    user:
      name: admin
      password: admin

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-environment}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# Application Configuration
app:
  encryption:
    key: ${ENCRYPTION_KEY:12345678901234567890123456789012}

# OpenAI Configuration
suprsyncr:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: ${OPENAI_MODEL:gpt-4o}
    max-output-tokens: 4096
    temperature: 0.7

# AWS S3 Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${S3_BUCKET_NAME:suprsyncr-product-images}
    endpoint: ${S3_ENDPOINT:}
    access-key-id: ${AWS_ACCESS_KEY_ID:test}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:test}

# Shopify OAuth Configuration
shopify:
  client-id: ${SHOPIFY_CLIENT_ID:}
  client-secret: ${SHOPIFY_CLIENT_SECRET:}
  scopes: read_products,write_products,read_orders,write_orders,read_inventory,write_inventory,read_analytics
  redirect-uri: ${SHOPIFY_REDIRECT_URI:http://localhost:8080/shopify/callback}

# HTTP Client Configuration
http:
  client:
    connect-timeout: 30000
    read-timeout: 60000
    write-timeout: 30000

# Logging Configuration
logging:
  level:
    root: INFO
    com.suprsyncr: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# Autopilot Agent Service Configuration
autopilot:
  agent-service-url: ${AGENT_SERVICE_URL:http://localhost:8081}
  enabled: true
  daily-run-enabled: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
