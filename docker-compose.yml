
services:
  postgres:
    image: postgres:16-alpine
    container_name: usp-postgres
    environment:
      POSTGRES_DB: usp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - usp-network

  agent:
    build: ./autopilot-agent
    container_name: usp-agent
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SPRING_BOOT_URL: http://backend:8080
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - usp-network

  localstack:
    image: localstack/localstack:latest
    container_name: usp-localstack
    environment:
      SERVICES: s3
      DEBUG: 1
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init-aws.sh
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - usp-network

volumes:
  postgres_data:
    driver: local
  localstack_data:
    driver: local

networks:
  usp-network:
    driver: bridge
